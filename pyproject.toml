[project]
name = "rtm-pymmcore"
version = "1.0.0"
description = "Real-time feedback control microscopy using pymmcore as interface "
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas",
    "numpy",
    "pyarrow",
    "ipykernel",
    "ipywidgets",
    "matplotlib",
    "napari[Pyqt6]",
    "scikit-image",
    "tifffile",
    "pymmcore-plus>=0.17.3",
    "pymmcore-widgets",
    "trackpy",
    "napari-micromanager",
    "imaging-server-kit",
]

[project.optional-dependencies]
ome_zarr = [
    "ome-zarr",
    ]

stardist = [
    "stardist",
    "tensorflow",
    "csbdeep",
    ]

cellpose = [
    "cellpose",
    "torch",
    ]

convpaint = [
    "napari-convpaint",
    "scipy"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", extra = "cellpose" },
]
napari-micromanager = { git = "https://github.com/pymmcore-plus/napari-micromanager" }


[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
