[project]
name = "rtm-pymmcore"
version = "1.0.0"
description = "Real-time feedback control microscopy using pymmcore as interface "
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas",
    "numpy",
    "pyarrow",
    "ipykernel",
    "ipywidgets",
    "matplotlib",
    "napari[Pyqt6]",
    "scikit-image",
    "tifffile",
    "pymmcore-plus>=0.17.3",
    "pymmcore-widgets",
    "trackpy",
    "napari-micromanager",
    "ome-writers",
    "zarr>=3",
]

[project.optional-dependencies]

test = [
    "pytest",
]

stardist = [
    "stardist",
    "tensorflow",
    "csbdeep",
    ]

cellpose = [
    "cellpose",
    "torch",
    ]

convpaint = [
    "napari-convpaint",
    "scipy"
]

remote-segmentation = [
    "imaging-server-kit",
]


virtual-microscope = [
    "virtual-microscope",
    "opencv-python",
    "imageio[ffmpeg]"
]



[[tool.uv.index]]
name = "pytorch-cu129"
url = "https://download.pytorch.org/whl/cu129"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu129" }
virtual-microscope = { git = "https://github.com/hinderling/virtual-microscope.git" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
