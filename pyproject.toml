[project]
name = "rtm-pymmcore"
version = "0.1.0"
description = "Real-time feedback control microscopy using pymmcore as interface "
readme = "README.md"
requires-python = ">=3.11, <3.13"
dependencies = [
    "pandas",
    "numpy",
    "pyarrow",
    "ipykernel",
    "ipywidgets",
    "matplotlib",
    "napari[all]",
    "scikit-image",
    "tifffile",
    "pymmcore-plus",
    "pymmcore-widgets",
    "trackpy",
    "napari-micromanager",
]

[project.optional-dependencies]
ome_zarr = [
    "ome-zarr",
    ]

stardist = [
    "stardist",
    "tensorflow",
    ]

cellpose = [
    "cellpose",
    "torch",
    ]


[tool.uv.sources]
torch = [
  { index = "pytorch-cu128", extra = "cellpose" },
]
napari-micromanager = { git = "https://github.com/pymmcore-plus/napari-micromanager" }


[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
