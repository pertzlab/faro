[project]
name = "faro"
version = "1.0.0"
description = "FARO - Feedback Adaptive Real-time Optogenetics"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pandas",
    "numpy",
    "pyarrow",
    "ipykernel",
    "ipywidgets",
    "matplotlib",
    "napari[Pyqt6]",
    "scikit-image",
    "tifffile",
    "pymmcore-plus>=0.17.3",
    "pymmcore-widgets",
    "trackpy",
    "napari-micromanager",
    "pymmcore-widgets",
    "ome-writers",
    "napari-ome-zarr",
    "zarr>=3",
]

[project.optional-dependencies]

test = [
    "pytest",
]

stardist = [
    "stardist",
    "tensorflow",
    "csbdeep",
    ]

cellpose = [
    "cellpose",
    "torch",
    ]

convpaint = [
    "napari-convpaint",
    "scipy"
]

remote-segmentation = [
    "imaging-server-kit",
]


virtual-microscope = [
    "virtual-microscope",
    "opencv-python",
    "imageio[ffmpeg]"
]

api74 = [
    "pymmcore==11.10.0.74.1"
]


[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch-cu130" }
virtual-microscope = { git = "https://github.com/hinderling/virtual-microscope.git" }
pymmcore-widgets = {git = "https://github.com/pymmcore-plus/pymmcore-widgets.git" }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
